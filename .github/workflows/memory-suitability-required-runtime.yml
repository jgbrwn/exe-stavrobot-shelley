name: memory-suitability-required-runtime

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'ci/run-memory-suitability-required-runtime.sh'
      - 'ci/check-memory-suitability-runtime-prereqs.sh'
      - 'run-shelley-managed-memory-suitability-gate.sh'
      - 'tests/test-shelley-managed-smoke-raw-media-runtime-contract.sh'
      - 'tests/test-shelley-managed-smoke-s2-narrow-fidelity-contract.sh'
      - 'tests/test-s4-recall-validation-runtime-contract.sh'
      - 'tests/test-ci-memory-suitability-required-runtime.sh'
      - 'tests/test-ci-memory-suitability-runtime-prereqs.sh'
      - '.github/workflows/memory-suitability-required-runtime.yml'
  schedule:
    - cron: '17 6 * * *'

jobs:
  required-runtime-gate:
    name: required-runtime memory suitability gate
    runs-on:
      - self-hosted
      - linux
      - shelley-required-runtime
    env:
      SHELLEY_DIR: /opt/shelley
      PROFILE_STATE_PATH: /home/exedev/exe-stavrobot-shelley/state/shelley-bridge-profiles.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runtime preflight
        run: ./ci/check-memory-suitability-runtime-prereqs.sh --shelley-dir "$SHELLEY_DIR" --profile-state-path "$PROFILE_STATE_PATH"

      - name: Run authoritative required-runtime gate
        run: ./ci/run-memory-suitability-required-runtime.sh --shelley-dir "$SHELLEY_DIR" --profile-state-path "$PROFILE_STATE_PATH"
